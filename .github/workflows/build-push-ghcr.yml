name: Build, Push, Deploy + Rollback

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "What do you want to do?"
        required: true
        default: "rollback"
        type: choice
        options:
          - rollback

permissions:
  contents: read
  packages: write

env:
  APP_NAME: portfolio-site

jobs:
  build_and_push:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name (lowercase)
        id: vars
        shell: bash
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/$REPO_LC"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: ${{ github.event_name == 'push' }}
    runs-on: [self-hosted, linux, x64, homelab]
    needs: build_and_push

    steps:
      - name: Deploy commit SHA to apps-1
        run: |
          set -euo pipefail
          ssh apps-1 "/opt/scripts/deploy-app.sh '${APP_NAME}' '${{ github.sha }}'"

  rollback:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'rollback' }}
    runs-on: [self-hosted, linux, x64, homelab]

    steps:
      - name: Rollback to previous deployed version on apps-1
        run: |
          set -euo pipefail
          ssh apps-1 "/opt/scripts/rollback-app.sh '${APP_NAME}'"
