name: Build & Push (GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Set this to your org or username (e.g., "direct-supply" or "akoske68")
  GHCR_OWNER: Austin-Koske
  # Image name defaults to repo name
  IMAGE_NAME: ${{ github.event.repository.name }}
  # Full image path
  IMAGE: ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch optional)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "${IMAGE}:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # If you want multi-arch, uncomment:
          # platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
